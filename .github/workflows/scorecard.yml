name: Scorecard

# Publishes OpenSSF Scorecard results so the repo earns a public score + badge.
# Runs weekly, on pushes to main, and whenever branch-protection changes (the
# branch_protection_rule event is what keeps the Branch-Protection check fresh).

on:
  branch_protection_rule:
  schedule:
    - cron: '19 5 * * 1' # Mondays 05:19 UTC
  push:
    branches: [main]

# Least privilege at top level; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish results to the Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: results.sarif
