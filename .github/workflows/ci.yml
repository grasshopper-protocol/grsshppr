name: CI

# Fast correctness gates on every PR and push to main. No secrets needed:
# typecheck and lint are pure static analysis. `next build` is intentionally
# omitted — it can hit the database during static generation, which would make
# CI flaky without production secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Hard gate: the build must typecheck.
      - name: Typecheck
        run: pnpm exec tsc --noEmit

      # Advisory until the existing lint debt is cleared, then promote to a hard
      # gate (drop continue-on-error) and add "quality" to branch protection.
      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true
